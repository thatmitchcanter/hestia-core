server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    error_log /dev/stdout info;
    access_log /dev/stdout;

    # Docker embedded DNS — resolve upstreams at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ =404;
    }

    location /pi-api/ {
        rewrite ^/pi-api/(.*) /$1 break;

        set $pihole_upstream pihole;
        proxy_pass https://$pihole_upstream;

        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host pi.hole;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /deluge-api/ {
        rewrite ^/deluge-api/(.*) /$1 break;
        set $deluge_upstream deluge:8112;
        proxy_pass http://$deluge_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cookie Handling (Critical)
        proxy_cookie_path / /deluge-api/;
    }

    location /jellyfin-api/ {
        rewrite ^/jellyfin-api/(.*) /$1 break;
        set $jellyfin_upstream jellyfin:8096;
        proxy_pass http://$jellyfin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}